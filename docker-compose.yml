services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: sqlite
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
    volumes:
      - hrm-api-db:/var/www/html/database
      - hrm-api-storage:/var/www/html/storage
    expose:
      - "8000"

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./build/web:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  hrm-api-db:
  hrm-api-storage:
