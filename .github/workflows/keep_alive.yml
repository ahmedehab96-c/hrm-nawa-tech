# Keep the Render free demo awake (spins down after ~15m idle).
# Pings /api/health every 10 minutes. Free workspaces have ~750 instance hours/month;
# 24/7 wake uses almost all of that — acceptable for one portfolio demo.
name: Keep Live Demo Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-alive-demo
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health
        run: |
          set -euo pipefail
          URL="${DEMO_URL:-https://hrm-nawa-api.onrender.com/api/health}"
          # Cold start can take ~60s; retry so a single slow wake does not fail the job.
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 90 "$URL" || true)
            echo "attempt=$i http=$code"
            if [ "$code" = "200" ]; then
              head -c 200 /tmp/health.json; echo
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after retries" >&2
          exit 1
        env:
          DEMO_URL: https://hrm-nawa-api.onrender.com/api/health
